name: Create Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write

jobs:
  builds:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.12'
          spec: 'main.py'
          upload_exe_with_name: 'My first executable'
          options: --onefile
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref,'refs/tags/')
        with:
          files: dist/*
